server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API and auth to the API container.
    # Use Docker's embedded DNS (127.0.0.11) with a variable so nginx resolves
    # the upstream lazily per-request instead of failing at startup if the API
    # container isn't ready yet.
    location ~ ^/(api|auth|health) {
        resolver 127.0.0.11 valid=10s;
        set $api_upstream http://api:4000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
